<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>05 · CSS varijable i teme</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>CSS Custom Properties (varijable) + Dark/Light tema</h1>
    <button id="theme-toggle" class="toggle-btn">🌙 Tamna tema</button>
  </header>

  <main>
    <div class="card">
      <h2>Kartica</h2>
      <p>Sve boje na ovoj stranici dolaze iz CSS varijabli definisanih u <code>:root</code> i <code>[data-theme="dark"]</code>.</p>
      <button class="primary">Primarno dugme</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

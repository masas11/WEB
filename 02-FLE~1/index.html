<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>02 · Flexbox</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">MojBrend</div>
    <ul class="nav-links">
      <li><a href="#">Početna</a></li>
      <li><a href="#">O nama</a></li>
      <li><a href="#">Kontakt</a></li>
    </ul>
  </nav>

  <h1>Flexbox Layout</h1>

  <h2>Kartice (flex-wrap + justify-content)</h2>
  <div class="cards">
    <div class="card">Kartica 1</div>
    <div class="card">Kartica 2</div>
    <div class="card">Kartica 3</div>
    <div class="card">Kartica 4</div>
    <div class="card">Kartica 5</div>
  </div>

  <h2>Centriranje (najčešći flex trik)</h2>
  <div class="centered-box">
    <div class="centered-content">Savršeno centrirano</div>
  </div>

  <h2>Redosled (order)</h2>
  <div class="order-demo">
    <div class="order-item" style="order: 3">Prvi u HTML-u, order: 3</div>
    <div class="order-item" style="order: 1">Drugi u HTML-u, order: 1</div>
    <div class="order-item" style="order: 2">Treći u HTML-u, order: 2</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03 · Animacije i tranzicije</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>CSS Animacije i tranzicije</h1>

  <h2>1. Transition (hover dugme)</h2>
  <button class="btn">Pređi mišem preko mene</button>

  <h2>2. Keyframes (spinner)</h2>
  <div class="spinner"></div>

  <h2>3. Keyframes (pulsirajuće dugme)</h2>
  <button class="btn-pulse">Pulsira</button>

  <h2>4. 3D flip kartica (transform + transition)</h2>
  <div class="flip-card">
    <div class="flip-inner">
      <div class="flip-front">Pređi mišem</div>
      <div class="flip-back">Pozdrav sa poleđine!</div>
    </div>
  </div>
</body>
</html>

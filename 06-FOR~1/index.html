<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>06 · Forme i validacija</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Forme i validacija</h1>
  <p class="intro">HTML5 built-in validacija (required, type, minlength) + prilagođena poruka greške u JS-u.</p>

  <form id="signup-form" novalidate>
    <div class="field">
      <label for="name">Ime</label>
      <input type="text" id="name" name="name" required minlength="2" />
      <span class="error-msg"></span>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />
      <span class="error-msg"></span>
    </div>

    <div class="field">
      <label for="password">Lozinka (min. 6 karaktera)</label>
      <input type="password" id="password" name="password" required minlength="6" />
      <span class="error-msg"></span>
    </div>

    <button type="submit">Registruj se</button>
    <p id="success-msg" class="success-msg" hidden>✅ Forma je uspešno poslata!</p>
  </form>

  <script src="script.js"></script>
</body>
</html>

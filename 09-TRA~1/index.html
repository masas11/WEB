<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>09 · Transforms i hover efekti</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>CSS Transforms i hover efekti</h1>

  <h2>1. Scale, rotate, translate (pojedinačno)</h2>
  <div class="row">
    <div class="box scale-hover">scale</div>
    <div class="box rotate-hover">rotate</div>
    <div class="box translate-hover">translate</div>
    <div class="box skew-hover">skew</div>
  </div>

  <h2>2. Kombinovan efekat na kartici</h2>
  <div class="row">
    <div class="fancy-card">
      <div class="fancy-card-inner">
        <h3>Naslov</h3>
        <p>Hover me za kombinovani transform + shadow + border efekat.</p>
      </div>
    </div>
  </div>

  <h2>3. Zumiranje slike unutar okvira (overflow hidden)</h2>
  <div class="row">
    <div class="img-frame">
      <div class="fake-img">🖼️ Slika</div>
    </div>
  </div>
</body>
</html>
